<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rasa Nusantara - Maestro Chibi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Marcellus&family=Poppins:wght@300;400;600;800&family=Bubblegum+Sans&display=swap');
        
        :root {
            --indonesia-red: #d63031;
            --batik-gold: #d4a373;
            --peach-soft: #faedcd;
            --cream-warm: #fefae0;
            --modern-teal: #2d6a4f;
            --accent-orange: #ff9f43;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--cream-warm);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(212, 163, 115, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 80% 70%, rgba(212, 163, 115, 0.1) 0%, transparent 20%),
                url("https://www.transparenttextures.com/patterns/batik-parang.png");
            color: #4a4a4a;
            overflow-x: hidden;
        }

        h1, h2, .font-title { font-family: 'Fredoka One', cursive; }
        .font-traditional { font-family: 'Marcellus', serif; }
        .font-cute { font-family: 'Bubblegum Sans', cursive; }

        .indonesia-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 60px;
            border: 12px solid #fff;
            box-shadow: 0 30px 100px rgba(212, 163, 115, 0.15);
        }

        .chibi-wrapper {
            position: relative;
            width: 160px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chibi-aura {
            position: absolute;
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, var(--peach-soft) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            animation: pulse-aura 3s infinite ease-in-out;
        }

        @keyframes pulse-aura {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 0.8; }
        }

        .chibi-img {
            font-size: 5.5rem;
            z-index: 1;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .game-title-container {
            position: relative;
            display: inline-block;
        }

        .cute-input {
            background: #fff;
            border: 3px solid var(--peach-soft);
            border-radius: 25px;
            padding: 18px;
            text-align: center;
            font-weight: 700;
            font-size: 1.2rem;
            transition: all 0.3s;
        }
        .cute-input:focus {
            border-color: var(--batik-gold);
            outline: none;
            box-shadow: 0 0 0 8px rgba(212, 163, 115, 0.1);
        }

        .key-btn {
            background: white;
            border-bottom: 6px solid #e0e0e0;
            border-radius: 20px;
            font-weight: 800;
            font-size: 1.2rem;
            transition: all 0.1s;
        }
        .key-btn:active:not(:disabled) { transform: translateY(4px); border-bottom-width: 2px; }
        .key-correct { background: var(--accent-orange) !important; color: white !important; border-color: #d35400 !important; }
        .key-wrong { background: #ffccd5 !important; color: #c0392b !important; border-color: #fab1a0 !important; opacity: 0.6; }

        .player-panel {
            transition: all 0.5s;
            border: 6px solid transparent;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 40px;
        }
        .player-panel.active {
            background: white;
            border-color: var(--batik-gold);
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        .letter-box {
            width: 50px;
            height: 70px;
            background: #fff;
            border: 4px solid var(--peach-soft);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 900;
            box-shadow: 0 6px 0 var(--peach-soft);
        }

        .btn-modern {
            background: var(--modern-teal);
            color: white;
            padding: 20px;
            border-radius: 30px;
            font-family: 'Fredoka One';
            font-size: 1.5rem;
            box-shadow: 0 8px 0 #1b4332;
            transition: all 0.2s;
        }
        .btn-modern:active { transform: translateY(4px); box-shadow: 0 2px 0 #1b4332; }

        .flash-effect {
            animation: flash 0.5s;
        }
        @keyframes flash {
            0% { opacity: 1; }
            50% { opacity: 0.5; background: #fff; }
            100% { opacity: 1; }
        }

        .pause-overlay {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="min-h-screen pb-12">

<div id="app" class="p-4 md:p-8 max-w-6xl mx-auto">
    
    <!-- Top Nav -->
    <div class="flex justify-between items-center mb-12">
        <div class="flex items-center gap-3">
            <span class="text-4xl">🍵</span>
            <span class="font-cute text-2xl font-bold text-gray-500 italic">Maestro Chibi</span>
        </div>
        <div class="flex gap-4">
            <button id="btn-map-exit" onclick="showMap()" class="hidden text-orange-600 font-black border-2 border-orange-200 px-6 py-2 rounded-full hover:bg-orange-50 transition-all">EXIT KE PETA</button>
            <button id="btn-profile-exit" onclick="exitToProfile()" class="hidden text-red-500 font-black border-2 border-red-200 px-6 py-2 rounded-full hover:bg-red-50 transition-all">GANTI PROFIL</button>
        </div>
    </div>

    <!-- 1. Screen: Home & Profile -->
    <div id="screen-profile" class="indonesia-card p-10 md:p-16 animate-fadeIn">
        <div class="text-center mb-16 relative">
            <div class="game-title-container">
                <span class="text-lg font-bold tracking-[0.3em] text-batik-gold uppercase">Kuliner Maestro</span>
                <h1 class="text-6xl md:text-8xl text-red-800 mt-2 mb-4 leading-tight">RASA<br>NUSANTARA</h1>
                <div class="flex justify-center gap-4 text-4xl"><span>🍲</span><span>🍡</span><span>🍛</span></div>
            </div>
            <p class="font-traditional text-2xl text-gray-500 mt-8">Petualangan rasa paling lucu & estetik!</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <!-- P1 Config -->
            <div class="flex flex-col items-center p-8 bg-[#fdfaf5] rounded-[50px] border-2 border-white shadow-sm">
                <div class="chibi-wrapper mb-6">
                    <div class="chibi-aura"></div>
                    <span id="preview-chibi-1" class="chibi-img">👨‍🍳</span>
                </div>
                <div class="w-full space-y-4">
                    <input type="text" id="p1-name" placeholder="Nama Kamu" class="w-full cute-input shadow-sm">
                    <div class="flex gap-2">
                        <select id="p1-gender" onchange="updatePreview(1)" class="flex-1 p-4 rounded-3xl font-bold bg-white outline-none border-2 border-orange-50">
                            <option value="L">Maestro Laki</option>
                            <option value="P">Maestro Perempuan</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- P2 Config -->
            <div class="flex flex-col items-center p-8 bg-[#fdfaf5] rounded-[50px] border-2 border-white shadow-sm">
                <div class="chibi-wrapper mb-6">
                    <div class="chibi-aura"></div>
                    <span id="preview-chibi-2" class="chibi-img">👩‍🍳</span>
                </div>
                <div class="w-full space-y-4">
                    <input type="text" id="p2-name" placeholder="Nama Teman" class="w-full cute-input shadow-sm">
                    <div class="flex gap-2">
                        <select id="p2-gender" onchange="updatePreview(2)" class="flex-1 p-4 rounded-3xl font-bold bg-white outline-none border-2 border-red-50">
                            <option value="L">Maestro Laki</option>
                            <option value="P" selected>Maestro Perempuan</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <button onclick="startGame()" class="w-full mt-12 btn-modern bg-red-700 hover:bg-red-600">MASUK DAPUR RASA</button>
    </div>

    <!-- 2. Screen: Map -->
    <div id="screen-map" class="hidden">
        <div class="text-center mb-12">
            <h2 class="text-5xl text-red-900 mb-4 uppercase">Peta Kuliner</h2>
            <div id="level-nav" class="flex justify-center gap-2"></div>
        </div>
        <div id="challenge-grid" class="grid grid-cols-2 md:grid-cols-5 gap-6"></div>
    </div>

    <!-- 3. Screen: Arena -->
    <div id="screen-arena" class="hidden relative">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <!-- P1 Status -->
            <div id="panel-p1" class="player-panel p-6 flex items-center gap-6">
                <div class="chibi-wrapper !w-24 !h-24">
                    <div class="chibi-aura"></div>
                    <span id="arena-chibi-1" class="chibi-img !text-5xl"></span>
                </div>
                <div>
                    <h4 id="name-p1" class="font-black text-xl uppercase tracking-tighter"></h4>
                    <div id="lives-p1" class="flex gap-1 mt-1 text-xl"></div>
                </div>
            </div>
            <!-- P2 Status -->
            <div id="panel-p2" class="player-panel p-6 flex items-center gap-6">
                <div class="chibi-wrapper !w-24 !h-24">
                    <div class="chibi-aura"></div>
                    <span id="arena-chibi-2" class="chibi-img !text-5xl"></span>
                </div>
                <div>
                    <h4 id="name-p2" class="font-black text-xl uppercase tracking-tighter"></h4>
                    <div id="lives-p2" class="flex gap-1 mt-1 text-xl"></div>
                </div>
            </div>
        </div>

        <div id="arena-card" class="indonesia-card p-8 md:p-12 relative overflow-hidden">
            <!-- HUD: Timer & Pause -->
            <div class="absolute top-4 left-0 w-full flex justify-center items-center gap-4 z-20">
                <button onclick="togglePause(true)" class="bg-white p-3 rounded-full shadow-lg border-2 border-orange-100 hover:scale-110 transition-transform">⏸️</button>
                <div id="timer-arena" class="bg-red-800 text-white px-8 py-3 rounded-full font-black text-2xl shadow-xl border-4 border-white">00:00</div>
            </div>
            
            <div class="mt-16 text-center">
                <div class="inline-block bg-white/50 px-8 py-4 rounded-3xl border-2 border-orange-100 mb-10">
                    <p id="quiz-hint" class="font-cute text-2xl text-gray-700"></p>
                </div>

                <div id="word-slots" class="flex flex-wrap justify-center gap-2 mb-12"></div>

                <div id="keyboard" class="grid grid-cols-7 md:grid-cols-10 gap-2 md:gap-3"></div>
            </div>
        </div>

        <!-- Pause Overlay -->
        <div id="pause-menu" class="absolute inset-0 z-50 pause-overlay rounded-[60px] hidden flex flex-col items-center justify-center p-10">
            <h3 class="text-6xl font-black text-white mb-8 drop-shadow-lg">ISTIRAHAT DULU?</h3>
            <div class="flex flex-col gap-4 w-full max-w-sm">
                <button onclick="togglePause(false)" class="btn-modern !bg-green-600 !shadow-green-900 uppercase">LANJUT MASAK</button>
                <button onclick="showMap()" class="btn-modern !bg-orange-600 !shadow-orange-900 uppercase">MENYERAH (KE PETA)</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal -->
<div id="modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-[100] p-6 backdrop-blur-md">
    <div class="bg-white rounded-[60px] p-12 max-w-lg w-full text-center border-[10px] border-peach-soft shadow-2xl">
        <div id="modal-icon" class="text-8xl mb-6 animate-bounce"></div>
        <h3 id="modal-title" class="text-4xl font-black mb-4 text-red-900 uppercase"></h3>
        <p id="modal-msg" class="text-gray-600 mb-8 font-bold text-lg"></p>
        
        <div id="modal-answer" class="bg-red-50 p-6 rounded-3xl mb-8 hidden border-2 border-red-100">
            <span class="text-xs uppercase font-black text-red-400">Jawaban Yang Benar</span>
            <p id="correct-word-reveal" class="text-3xl font-black text-red-600 tracking-widest"></p>
        </div>

        <button id="modal-btn" class="w-full btn-modern py-5 rounded-3xl uppercase tracking-widest"></button>
    </div>
</div>

<script>
    const FOOD_DB = {
        1: [
            { word: "RAWON", hint: "Sup berkuah legam dari Jawa Timur yang menggunakan biji kluwek sebagai bumbu utamanya.", diff: "easy" },
            { word: "KERAK TELOR", hint: "Omelet tradisional Betawi yang dimasak di wajan terbalik hingga berkerak gurih.", diff: "easy" },
            { word: "GUDEG", hint: "Nangka muda yang dimasak berjam-jam dengan santan dan gula merah hingga berwarna cokelat manis.", diff: "easy" },
            { word: "PAPEDA", hint: "Bubur sagu kenyal dari Papua yang cara makannya harus digulung menggunakan 'gata-gata'.", diff: "easy" }
        ],
        3: [
            { word: "AYAM TALIWANG", hint: "Ayam bakar pedas khas Lombok yang dibumbui cabai kering dan terasi pilihan.", diff: "hard" },
            { word: "COTO MAKASSAR", hint: "Sup jeroan sapi dengan kuah kental yang dicampur dengan kacang tanah sangrai.", diff: "hard" },
            { word: "BIKA AMBON", hint: "Kue basah berongga asal Medan dengan aroma daun jeruk dan serai yang kuat.", diff: "hard" }
        ],
        5: [
            { word: "RENDANG DAGING", hint: "Proses memasak daging yang membutuhkan waktu hingga 8 jam sampai bumbu santan mengering hitam.", diff: "hard" },
            { word: "AYAM TANGKAP", hint: "Hidangan Aceh di mana potongan ayam goreng tersembunyi di bawah gunungan rempah goreng.", diff: "hard" },
            { word: "PINDANG PATIN", hint: "Ikan sungai berlemak dengan kuah asam pedas yang segar menggunakan potongan nanas.", diff: "hard" }
        ]
    };

    const CHIBIS = {
        L: ['👦', '👨‍🍳', '👲', '👳', '🤺'],
        P: ['👧', '👩‍🍳', '🧕', '👰', '💃']
    };

    let state = {
        lvl: 1,
        isPaused: false,
        p1: { name: "", lives: 3, gender: "L", avatar: "", progress: 1 },
        p2: { name: "", lives: 3, gender: "P", avatar: "", progress: 1 },
        game: {
            activeP: 1,
            word: "",
            hint: "",
            guessed: [],
            timer: 0,
            interval: null
        }
    };

    function updatePreview(id) {
        const g1 = document.getElementById('p1-gender').value;
        const g2 = document.getElementById('p2-gender').value;
        document.getElementById('preview-chibi-1').innerText = g1 === 'L' ? '👨‍🍳' : '👩‍🍳';
        document.getElementById('preview-chibi-2').innerText = g2 === 'L' ? '👨‍🍳' : '👩‍🍳';
    }

    function startGame() {
        state.p1.name = document.getElementById('p1-name').value || "Maestro 1";
        state.p2.name = document.getElementById('p2-name').value || "Maestro 2";
        state.p1.gender = document.getElementById('p1-gender').value;
        state.p2.gender = document.getElementById('p2-gender').value;

        state.p1.avatar = CHIBIS[state.p1.gender][Math.floor(Math.random() * CHIBIS[state.p1.gender].length)];
        state.p2.avatar = CHIBIS[state.p2.gender][Math.floor(Math.random() * CHIBIS[state.p2.gender].length)];

        document.getElementById('screen-profile').classList.add('hidden');
        document.getElementById('btn-profile-exit').classList.remove('hidden');
        showMap();
    }

    function showMap() {
        clearInterval(state.game.interval);
        state.isPaused = false;
        document.getElementById('pause-menu').classList.add('hidden');
        document.getElementById('screen-arena').classList.add('hidden');
        document.getElementById('screen-profile').classList.add('hidden');
        document.getElementById('screen-map').classList.remove('hidden');
        
        document.getElementById('btn-map-exit').classList.add('hidden');
        document.getElementById('btn-profile-exit').classList.remove('hidden');

        const nav = document.getElementById('level-nav');
        nav.innerHTML = "";
        for(let i=1; i<=5; i++) {
            const btn = document.createElement('button');
            const isActive = state.lvl === i;
            btn.className = `px-6 py-2 rounded-full font-black transition-all ${isActive ? 'bg-red-700 text-white shadow-lg' : 'bg-white text-gray-400'}`;
            btn.innerText = `Lvl ${i}`;
            btn.onclick = () => { state.lvl = i; showMap(); };
            nav.appendChild(btn);
        }

        const grid = document.getElementById('challenge-grid');
        grid.innerHTML = "";
        for(let i=1; i<=5; i++) {
            const isLocked = i > state.p1.progress;
            const card = document.createElement('div');
            card.className = `p-8 rounded-[40px] border-4 text-center transition-all ${isLocked ? 'bg-gray-100 border-gray-200 grayscale opacity-50' : 'bg-white border-peach-soft cursor-pointer hover:scale-105 shadow-sm'}`;
            card.innerHTML = `<div class="text-5xl mb-3">${isLocked ? '🔒' : '🥘'}</div><h5 class="font-black text-sm uppercase">Tantangan ${i}</h5>`;
            if(!isLocked) card.onclick = () => startArena();
            grid.appendChild(card);
        }
    }

    function startArena() {
        state.game.activeP = 1;
        state.p1.lives = 3;
        state.p2.lives = 3;
        document.getElementById('screen-map').classList.add('hidden');
        document.getElementById('screen-arena').classList.remove('hidden');
        document.getElementById('btn-profile-exit').classList.add('hidden');
        document.getElementById('btn-map-exit').classList.remove('hidden');
        
        document.getElementById('arena-chibi-1').innerText = state.p1.avatar;
        document.getElementById('arena-chibi-2').innerText = state.p2.avatar;
        document.getElementById('name-p1').innerText = state.p1.name;
        document.getElementById('name-p2').innerText = state.p2.name;
        loadQuestion();
    }

    function togglePause(shouldPause) {
        state.isPaused = shouldPause;
        const menu = document.getElementById('pause-menu');
        if(shouldPause) {
            menu.classList.remove('hidden');
            clearInterval(state.game.interval);
        } else {
            menu.classList.add('hidden');
            startTimer();
        }
    }

    function loadQuestion() {
        const pNum = state.game.activeP;
        document.getElementById('panel-p1').classList.toggle('active', pNum === 1);
        document.getElementById('panel-p2').classList.toggle('active', pNum === 2);
        
        document.getElementById('arena-card').classList.add('flash-effect');
        setTimeout(() => document.getElementById('arena-card').classList.remove('flash-effect'), 500);

        const db = FOOD_DB[state.lvl] || FOOD_DB[1];
        const item = db[Math.floor(Math.random() * db.length)];
        
        state.game.word = item.word;
        state.game.hint = item.hint;
        state.game.guessed = [];
        state.game.timer = item.diff === 'easy' ? 60 : 120;

        updateArena();
        startTimer();
    }

    function updateArena() {
        [1, 2].forEach(num => {
            const container = document.getElementById(`lives-p${num}`);
            container.innerHTML = "";
            for(let i=0; i<3; i++) container.innerHTML += i < state[`p${num}`].lives ? '❤️' : '🖤';
        });

        const slots = document.getElementById('word-slots');
        slots.innerHTML = "";
        [...state.game.word].forEach(c => {
            const div = document.createElement('div');
            div.className = c === " " ? "w-4" : "letter-box";
            if (c !== " " && state.game.guessed.includes(c)) div.innerText = c;
            slots.appendChild(div);
        });
        document.getElementById('quiz-hint').innerText = state.game.hint;

        const kb = document.getElementById('keyboard');
        kb.innerHTML = "";
        "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(c => {
            const btn = document.createElement('button');
            btn.className = "key-btn p-3 md:p-4";
            btn.innerText = c;
            if(state.game.guessed.includes(c)) {
                btn.classList.add(state.game.word.includes(c) ? 'key-correct' : 'key-wrong');
                btn.disabled = true;
            }
            btn.onclick = () => {
                if(state.isPaused) return;
                state.game.guessed.push(c);
                if(!state.game.word.includes(c)) state[`p${state.game.activeP}`].lives--;
                updateArena();
                checkGameStatus();
            };
            kb.appendChild(btn);
        });
    }

    function checkGameStatus() {
        if([...state.game.word.replace(/\s/g, '')].every(x => state.game.guessed.includes(x))) {
            winTurn();
        } else if(state[`p${state.game.activeP}`].lives <= 0) {
            gameOver("DAPUR BERANTAKAN!");
        }
    }

    function startTimer() {
        clearInterval(state.game.interval);
        state.game.interval = setInterval(() => {
            if(state.isPaused) return;
            state.game.timer--;
            const m = Math.floor(state.game.timer / 60);
            const s = state.game.timer % 60;
            document.getElementById('timer-arena').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            if(state.game.timer <= 0) gameOver("WAKTU MASAK HABIS!");
        }, 1000);
    }

    function winTurn() {
        clearInterval(state.game.interval);
        if(state.game.activeP === 1) {
            state.game.activeP = 2;
            loadQuestion();
        } else {
            showModal("YEAY! LEVEL CLEAR!", "Kalian berdua adalah duet maut di dapur!", "🍡", true, () => {
                if(state.lvl === state.p1.progress) state.p1.progress++;
                showMap();
            });
        }
    }

    function gameOver(reason) {
        clearInterval(state.game.interval);
        showModal("GAME OVER!", `${reason}. ${state[`p${state.game.activeP}`].name} gagal menyajikan hidangan.`, "🍵", false, () => showMap(), null, state.game.word);
    }

    function showModal(title, msg, icon, success, callback, time = null, revealWord = null) {
        const m = document.getElementById('modal');
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-msg').innerText = msg;
        document.getElementById('modal-icon').innerText = icon;
        
        const ansArea = document.getElementById('modal-answer');
        if(revealWord) {
            ansArea.classList.remove('hidden');
            document.getElementById('correct-word-reveal').innerText = revealWord;
        } else {
            ansArea.classList.add('hidden');
        }

        const btn = document.getElementById('modal-btn');
        btn.innerText = success ? "LANJUTKAN" : "KEMBALI KE PETA";
        btn.onclick = () => { m.classList.add('hidden'); callback(); };
        m.classList.remove('hidden');
        m.classList.add('flex');
    }

    function exitToProfile() {
        clearInterval(state.game.interval);
        document.getElementById('screen-arena').classList.add('hidden');
        document.getElementById('screen-map').classList.add('hidden');
        document.getElementById('screen-profile').classList.remove('hidden');
        document.getElementById('btn-map-exit').classList.add('hidden');
        document.getElementById('btn-profile-exit').classList.add('hidden');
    }
